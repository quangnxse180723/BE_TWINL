# ============================================================
# PayOS – VietQR (Tiền thật)
# ============================================================
# Lấy 3 giá trị này từ: https://my.payos.vn/ -> API Keys
# Khi test local dùng ngrok để nhận Webhook:
#   1. Chạy: ngrok http 8080
#   2. Copy URL ngrok -> dán vào cancel-url và return-url tương ứng
